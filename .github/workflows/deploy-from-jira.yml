name: Deploy From Jira

on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: Jira ticket key, for example SCRUM-5
        required: true
        type: string
      trigger_argocd_sync:
        description: Trigger ArgoCD sync explicitly after GitOps commit
        required: false
        default: false
        type: boolean
      test_mode:
        description: Simulate GitOps and ArgoCD without pushing changes
        required: false
        default: false
        type: boolean
      rollback_to_last_success:
        description: Revert the resolved app and environment to the last known successful deployment state
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Windows
      - X64
      - leninkart
      - local
      - dev
    env:
      RUNNER_PYTHON_DIR: C:\actions-runner\tools\python313
      RUNNER_ARGOCD_DIR: C:\actions-runner\tools\argocd
      KUBECONFIG: C:\actions-runner\tools\kube\config
    steps:
      - uses: actions/checkout@v4

      - name: Configure self-hosted tool paths
        shell: cmd
        run: |
          if not exist "%RUNNER_PYTHON_DIR%\python.exe" (
            echo Python not found at %RUNNER_PYTHON_DIR%\python.exe
            exit /b 1
          )
          if not exist "%RUNNER_ARGOCD_DIR%\argocd.exe" (
            echo ArgoCD CLI not found at %RUNNER_ARGOCD_DIR%\argocd.exe
            exit /b 1
          )
          echo %RUNNER_PYTHON_DIR%>> "%GITHUB_PATH%"
          echo %RUNNER_ARGOCD_DIR%>> "%GITHUB_PATH%"

      - name: Start local ArgoCD port-forward
        shell: cmd
        run: |
          start "argocd-port-forward" /B kubectl port-forward -n argocd svc/argocd-server 8085:443 > "%RUNNER_TEMP%\argocd-port-forward.log" 2>&1
          powershell -NoProfile -ExecutionPolicy Bypass -Command "$deadline=(Get-Date).AddSeconds(60); while((Get-Date) -lt $deadline){ try { $client = New-Object System.Net.Sockets.TcpClient; $iar = $client.BeginConnect('127.0.0.1',8085,$null,$null); if($iar.AsyncWaitHandle.WaitOne(2000,$false) -and $client.Connected){ $client.Close(); exit 0 }; $client.Close() } catch {}; Start-Sleep -Seconds 1 }; exit 1"

      - name: Verify local runner toolchain
        shell: cmd
        run: |
          python --version
          git --version
          kubectl version --client
          argocd version --client

      - name: Install dependencies
        shell: cmd
        run: python -m pip install -r requirements.txt

      - name: Execute Jira deployment orchestrator
        shell: cmd
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          INFRA_PAT: ${{ secrets.INFRA_PAT }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_INSECURE: "true"
          DEPLOY_GIT_USER: deployment-poc[bot]
          DEPLOY_GIT_EMAIL: deployment-poc@users.noreply.github.com
          RUNNER_NAME: ${{ runner.name }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: python -m src.orchestrator --jira-ticket "${{ inputs.jira_ticket }}" ${{ inputs.trigger_argocd_sync && '--trigger-argocd-sync' || '' }} ${{ inputs.test_mode && '--test-mode' || '' }} ${{ inputs.rollback_to_last_success && '--rollback-to-last-success' || '' }}

      - name: Print resolved deployment result
        if: always()
        shell: cmd
        run: |
          if exist artifacts\deployment-result.json (
            python -c "import json, pathlib; data=json.loads(pathlib.Path('artifacts/deployment-result.json').read_text()); print('jira_ticket=', data.get('jira_ticket')); print('runner_name=', data.get('runner_name')); print('target_app=', data.get('target', {}).get('app_key')); print('target_env=', data.get('target', {}).get('environment')); print('resolved_version=', data.get('target', {}).get('resolved_version')); print('gitops_commit=', data.get('gitops_commit')); print('argocd_app=', data.get('target', {}).get('argocd_app')); print('deployment_action=', data.get('deployment_action')); print('outcome=', data.get('outcome')); print('argocd_status=', data.get('argocd_status_json')); print('lock=', data.get('lock_json')); print('state=', data.get('state_json')); print('rollback=', data.get('rollback_json')); print('postchecks=', data.get('postchecks_json'))"
          ) else (
            echo deployment-result.json not found
            exit /b 1
          )

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-result
          path: artifacts/

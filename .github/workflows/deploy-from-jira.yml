name: Deploy From Jira

on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: Jira ticket key, for example SCRUM-5
        required: true
        type: string
      trigger_argocd_sync:
        description: Trigger ArgoCD sync explicitly after GitOps commit
        required: false
        default: false
        type: boolean
      test_mode:
        description: Simulate GitOps and ArgoCD without pushing changes
        required: false
        default: false
        type: boolean
      rollback_to_last_success:
        description: Revert the resolved app and environment to the last known successful deployment state
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Windows
      - X64
      - leninkart
      - local
      - dev
    env:
      RUNNER_PYTHON_DIR: C:\actions-runner\tools\python313
      RUNNER_ARGOCD_DIR: C:\actions-runner\tools\argocd
      KUBECONFIG: C:\actions-runner\tools\kube\config
    steps:
      - uses: actions/checkout@v4

      - name: Configure self-hosted tool paths
        shell: cmd
        run: |
          if not exist "%RUNNER_PYTHON_DIR%\python.exe" (
            echo Python not found at %RUNNER_PYTHON_DIR%\python.exe
            exit /b 1
          )
          if not exist "%RUNNER_ARGOCD_DIR%\argocd.exe" (
            echo ArgoCD CLI not found at %RUNNER_ARGOCD_DIR%\argocd.exe
            exit /b 1
          )
          echo %RUNNER_PYTHON_DIR%>> "%GITHUB_PATH%"
          echo %RUNNER_ARGOCD_DIR%>> "%GITHUB_PATH%"

      - name: Start local ArgoCD port-forward
        shell: powershell
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP 'argocd-port-forward.log'
          $pidPath = Join-Path $env:RUNNER_TEMP 'argocd-port-forward.pid'
          if (Test-Path $logPath) { Remove-Item -LiteralPath $logPath -Force }
          if (Test-Path $pidPath) { Remove-Item -LiteralPath $pidPath -Force }
          $process = Start-Process -FilePath 'kubectl' -ArgumentList 'port-forward','-n','argocd','svc/argocd-server','8085:443' -RedirectStandardOutput $logPath -RedirectStandardError $logPath -PassThru -WindowStyle Hidden
          $process.Id | Set-Content -LiteralPath $pidPath
          $deadline = (Get-Date).AddSeconds(60)
          while ((Get-Date) -lt $deadline) {
            if ($process.HasExited) {
              Get-Content -LiteralPath $logPath -ErrorAction SilentlyContinue
              throw "ArgoCD port-forward exited early with code $($process.ExitCode)"
            }
            try {
              $response = Invoke-WebRequest -Uri 'https://127.0.0.1:8085/api/version' -UseBasicParsing -SkipCertificateCheck -TimeoutSec 5
              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 500) {
                Write-Host 'ArgoCD port-forward is ready'
                exit 0
              }
            } catch {
            }
            Start-Sleep -Seconds 2
          }
          Get-Content -LiteralPath $logPath -ErrorAction SilentlyContinue
          throw 'Timed out waiting for ArgoCD port-forward to become ready'

      - name: Verify local runner toolchain
        shell: cmd
        run: |
          python --version
          git --version
          kubectl version --client
          argocd version --client

      - name: Install dependencies
        shell: cmd
        run: python -m pip install -r requirements.txt

      - name: Execute Jira deployment orchestrator
        shell: cmd
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          INFRA_PAT: ${{ secrets.INFRA_PAT }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          GITHUB_API_TOKEN: ${{ github.token }}
          ARGOCD_INSECURE: "true"
          DEPLOY_GIT_USER: deployment-poc[bot]
          DEPLOY_GIT_EMAIL: deployment-poc@users.noreply.github.com
          RUNNER_NAME: ${{ runner.name }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: python -m src.orchestrator --jira-ticket "${{ inputs.jira_ticket }}" ${{ inputs.trigger_argocd_sync && '--trigger-argocd-sync' || '' }} ${{ inputs.test_mode && '--test-mode' || '' }} ${{ inputs.rollback_to_last_success && '--rollback-to-last-success' || '' }}

      - name: Print resolved deployment result
        if: always()
        shell: cmd
        run: |
          if exist artifacts\deployment-result.json (
            python -c "import json, pathlib; data=json.loads(pathlib.Path('artifacts/deployment-result.json').read_text()); print('jira_ticket=', data.get('jira_ticket')); print('runner_name=', data.get('runner_name')); print('target_app=', data.get('target', {}).get('app_key')); print('target_env=', data.get('target', {}).get('environment')); print('resolved_version=', data.get('target', {}).get('resolved_version')); print('gitops_commit=', data.get('gitops_commit')); print('argocd_app=', data.get('target', {}).get('argocd_app')); print('deployment_action=', data.get('deployment_action')); print('outcome=', data.get('outcome')); print('argocd_status=', data.get('argocd_status_json')); print('lock=', data.get('lock_json')); print('state=', data.get('state_json')); print('rollback=', data.get('rollback_json')); print('postchecks=', data.get('postchecks_json')); print('jira_progress=', data.get('jira_progress_json')); print('jira_feedback=', data.get('jira_feedback_json'))"
          ) else (
            echo deployment-result.json not found
            exit /b 1
          )

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-result
          path: artifacts/

policy:
  lock_timeout_minutes: 30
  stale_lock_check_enabled: true
  auto_release_stale_locks: true
  allow_force_unlock: true
  unlock_requires_run_check: true
  auto_rollback_enabled: true
  allow_duplicate_deployments: false
  url_fallback_warning_enabled: true
  manual_rollback_enabled: true
  retry_reconcile_without_redeploy: true

environments:
  dev:
    namespace: dev
    cluster_context: k3d-leninkart-dev
    argocd_root_app: leninkart-root
    requires_argocd_verification: false
    notes: >
      Current LeninKart development environment. Repo-backed GitOps discovery is authoritative.
      Live cluster checks require the local k3d / Docker runtime to be available.
  staging:
    namespace: staging
    cluster_context: leninkart-staging-eks
    aws_region: us-east-1
    argocd_root_app: leninkart-root
    requires_argocd_verification: true
    notes: >
      AWS staging environment (EKS). GitOps sync happens against main and targets staging namespaces.
      ArgoCD reconciliation is treated as the primary health signal for this environment.

active_project_key: leninkart
default_environment: dev
allowed_environments:
  - dev
default_runner_labels:
  - self-hosted
  - Windows
  - X64
  - leninkart
  - local
  - dev
jira_feedback:
  enabled: true
  progress_comments:
    enabled: true
    stages:
      - workflow_triggered
      - jira_validated
      - target_resolved
      - lock_acquired
      - gitops_commit_pushed
      - argocd_sync_started
      - argocd_synced_healthy
      - post_checks_completed
      - completed
      - failed
  transition_name_candidates:
    success:
      - Done
      - Deployed
      - Closed
    failure:
      - Failed
      - Blocked
      - In Progress
    already_deployed:
      - Done
      - Deployed
      - In Progress
    rollback_skipped:
      - Done
      - Deployed
      - In Progress
  comment_on:
    success: true
    failure: true
    noop: true
  require_transition_success: false
version_resolution:
  latest_aliases:
    default:
      - latest
    by_env:
      dev:
        - latest-dev

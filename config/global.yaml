active_project_key: leninkart
default_environment: dev
allowed_environments:
  - dev
  - staging
default_runner_labels:
  - self-hosted
  - Windows
  - X64
  - leninkart
  - local
  - dev
terraform_automation:
  repo: Leninfitfreak/Terraform-AWS
  ref: main
  provision_workflow: aws-staging-provision.yml
  destroy_workflow: aws-staging-destroy.yml
  timeout_seconds: 3600
  poll_seconds: 20
jira_feedback:
  enabled: true
  progress_comments:
    enabled: true
    stages:
      - workflow_triggered
      - jira_validated
      - target_resolved
      - lock_acquired
      - gitops_commit_pushed
      - argocd_sync_started
      - argocd_sync_in_progress
      - argocd_final_verification
      - argocd_synced_healthy
      - post_checks_completed
      - rollback_started
      - rollback_completed
      - rollback_failed
      - completed
      - failed
  transition_name_candidates:
    success:
      - Done
      - Deployed
      - Closed
    failure:
      - Failed
      - Blocked
      - In Progress
    already_deployed:
      - Done
      - Deployed
      - In Progress
    rollback_skipped:
      - Done
      - Deployed
      - In Progress
    rolled_back:
      - Failed
      - Blocked
      - In Progress
    rollback_failed:
      - Failed
      - Blocked
      - In Progress
  comment_on:
    success: true
    failure: true
    noop: true
  require_transition_success: false
version_resolution:
  latest_aliases:
    default:
      - latest
    by_env:
      dev:
        - latest-dev
      staging:
        - latest-staging
